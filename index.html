<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarWise - ค้นหารถและคำนวณความคุ้มค่า</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="mobile-menu-overlay" onclick="closeMobileMenu()"></div>
    <div class="mobile-menu" id="mobileMenu">
        <div class="mobile-menu-header">
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                    </svg>
                </div>
                CarWise
            </a>
            <button class="mobile-menu-close" onclick="closeMobileMenu()">✕</button>
        </div>
        <nav class="mobile-menu-nav">
            <a href="index.html" class="nav-link active">
                <img src="icon-images\car.png"  alt="Search" class="nav-icon">
                 ค้นหารถ
            </a>
            <a href="oil.html" class="nav-link">
                <img src="icon-images\oil-barrel.png"  alt="Oil" class="nav-icon">
                 ราคาน้ำมัน
            </a>
            <a href="quiz.html" class="nav-link">
                <img src="icon-images/ideas.png"  alt="Quiz" class="nav-icon">
                 หารถที่เข้ากับคุณ
            </a>
        </nav>
        <div class="mobile-menu-footer">
            <div id="mobileUserInfo" style="font-size:0.9rem;color:var(--text-secondary);">CarWise</div>
        </div>
    </div>

    <nav class="navbar">
        <div class="logo">
            CarWise <span class="badge">TH</span></div>
        <div class="nav-menu">
            <a href="index.html" class="nav-link active">
                <img src="icon-images\car.png"  alt="Search" class="nav-icon">
                 ค้นหารถ
            </a>
            <a href="oil.html" class="nav-link">
                <img src="icon-images\oil-barrel.png"  alt="Oil" class="nav-icon">
                 ราคาน้ำมัน
            </a>
            <a href="quiz.html" class="nav-link">
                <img src="icon-images/ideas.png"  alt="Quiz" class="nav-icon">
                 หารถที่เข้ากับคุณ
            </a>
        </div>
        <button class="mobile-menu-btn" onclick="toggleMobileMenu()" aria-label="Open menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
        <div class="nav-right" id="navRight">
            <div id="userArea"></div>
        </div>
    </nav>

    <div class="hero">
        <div class="hero-content">
            <h1 style="font-size: 3.25rem;">ค้นหารถคู่ใจ <br><span class="highlight">คำนวณความคุ้มค่า</span></h1>
            <p class="subtitle">เช็คสเปครถพร้อมคำนวณค่าน้ำมันเฉลี่ยต่อกิโลเมตร</p>

            <div class="search-container">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="เช่น Toyota Camry, Tesla, Honda Civic...">
                    <button id="searchBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="quick-tags">
                <span>ยอดนิยม:</span>
                <button onclick="quickSearch('Tesla')">Tesla</button>
                <button onclick="quickSearch('Honda')">Honda</button>
                <button onclick="quickSearch('Toyota')">Toyota</button>
                <button onclick="quickSearch('BYD')">BYD</button>
            </div>
        </div>
    </div>

    <!-- รถยอดนิยมแบ่งตามประเภท -->
    <div class="container" id="popularCarsSection">
        <h2 class="highlight" style="text-align: center; padding-bottom: 50px;"> รถยนต์ยอดนิยม</h2>
        
        <div class="category-box" style="--cat-color: var(--primary);">
            <div class="category-header">
                <div class="category-icon">⛽</div>
                <h3>รถยนต์สันดาป (Gasoline)</h3>
            </div>
            <div id="popularGasoline" class="result-grid"></div>
        </div>

        <div class="category-box" style="--cat-color: #10b981;">
            <div class="category-header">
                <div class="category-icon">🔋</div>
                <h3>รถยนต์ไฮบริด (Hybrid)</h3>
            </div>
            <div id="popularHybrid" class="result-grid"></div>
        </div>

        <div class="category-box" style="--cat-color: var(--accent);">
            <div class="category-header">
                <div class="category-icon">⚡</div>
                <h3>รถยนต์ไฟฟ้า (EV)</h3>
            </div>
            <div id="popularEV" class="result-grid"></div>
        </div>
    </div>

    <div class="container">
        <!-- Search Results will overwrite or appear here -->
        <h2 id="searchResultsTitle" style="display: none; margin-bottom: 20px; font-size: 2.5rem;">ผลการค้นหา</h2>
        <div id="result" class="result-grid"></div>
    </div>

    <script src="javascript.js"></script>
</body>

</html>
