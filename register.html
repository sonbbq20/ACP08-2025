<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CarWise</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="mobile-menu-overlay" onclick="closeMobileMenu()"></div>
    <div class="mobile-menu" id="mobileMenu">
        <div class="mobile-menu-header">
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                    </svg>
                </div>
                CarWise
            </a>
            <button class="mobile-menu-close" onclick="closeMobileMenu()">✕</button>
        </div>
        <nav class="mobile-menu-nav">
            <a href="index.html" class="nav-link">
                <img src="icon-images\car.png"  alt="Search" class="nav-icon">
                 ค้นหารถ
            </a>
            <a href="oil.html" class="nav-link">
                <img src="icon-images\oil-barrel.png"  alt="Oil" class="nav-icon">
                 ราคาน้ำมัน
            </a>
            <a href="quiz.html" class="nav-link">
                <img src="icon-images/ideas.png"  alt="Quiz" class="nav-icon">
                 หารถที่เข้ากับคุณ
            </a>
            <a href="favorites.html" class="nav-link">
                <img src="icon-images/star.png"  alt="Saved" class="nav-icon">
                 รายการโปรด
            </a>
            <a href="favorites.html" class="nav-link">
                <img src="icon-images/star.png"  alt="Saved" class="nav-icon">
                 รายการโปรด
            </a>
        </nav>
        <div class="mobile-menu-footer">
            <div id="mobileUserInfo" style="font-size:0.9rem;color:var(--text-secondary);">CarWise</div>
        </div>
    </div>
    <nav class="navbar">
        <div class="logo">CarWise <span class="badge">TH</span></div>
        <div class="nav-menu">
            <a href="index.html" class="nav-link">
                <img src="icon-images\car.png"  alt="Search" class="nav-icon">
                 ค้นหารถ
            </a>
            <a href="oil.html" class="nav-link">
                <img src="icon-images\oil-barrel.png"  alt="Oil" class="nav-icon">
                 ราคาน้ำมัน
            </a>
            <a href="quiz.html" class="nav-link">
                <img src="icon-images/ideas.png"  alt="Quiz" class="nav-icon">
                 หารถที่เข้ากับคุณ
            </a>
        </div>
        <button class="mobile-menu-btn" onclick="toggleMobileMenu()" aria-label="Open menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
        <div class="nav-right" id="navRight">
            <div id="userArea"></div>
        </div>
    </nav>

    <div class="login-page">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <div class="login-logo">
                        <div class="logo-icon">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                            </svg>
                        </div>
                        <span>CarWise</span>
                    </div>
                    <h1 class="login-title">Create account</h1>
                    <p class="login-subtitle">Register a new account to continue</p>
                </div>

                <form class="login-form" onsubmit="registerUser(event)">
                    <div class="form-group">
                        <label class="form-label">Full name</label>
                        <input id="reg-name" type="text" class="form-input" placeholder="Your full name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input id="reg-email" type="email" class="form-input" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input id="reg-password" type="password" class="form-input" placeholder="Choose a password" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <input id="reg-password-confirm" type="password" class="form-input" placeholder="Confirm password" required>
                    </div>

                    <button type="submit" class="btn btn-primary">Create account</button>
                </form>

                <div class="login-divider"><span>or</span></div>

                <p class="login-footer">Already have an account? <a href="login.html">Sign in</a></p>
            </div>
        </div>
    </div>

    <script src="javascript.js"></script>
</body>
</html>
